<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Beauty Lab · Sistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060606;--bg2:#0f0f0f;--bg3:#181818;
  --gold:#C9A452;--gold2:#E8C87A;--gd:rgba(201,164,82,0.12);--gb:rgba(201,164,82,0.22);
  --w:#fff;--g1:#d8d8d8;--g2:#888;--g3:#444;
  --border:#1e1e1e;--red:#f06060;--green:#5EE087;--blue:#64b5ff;
  --fd:'Cormorant Garamond',Georgia,serif;--fb:'Outfit',sans-serif;
  --r:10px;--sw:220px;--tr:.16s ease;
}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--w);overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* LOGIN */
#ls{display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse 80% 60% at 30% 70%,rgba(201,164,82,.07),transparent)}
.lb{width:340px;padding:46px 36px;background:var(--bg2);border:1px solid var(--gb);border-radius:18px;
  text-align:center;box-shadow:0 28px 80px rgba(0,0,0,.8)}
.lm{font-family:var(--fd);font-size:52px;font-weight:300;color:var(--gold);letter-spacing:-2px}
.ln{font-family:var(--fd);font-size:11px;letter-spacing:7px;text-transform:uppercase;color:var(--g2);margin-top:2px}
.ls2{font-size:9px;color:var(--g3);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.ll{width:32px;height:1px;background:var(--gb);margin:22px auto}
.li{width:100%;padding:11px 14px;margin-bottom:9px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--w);font-family:var(--fb);font-size:14px;outline:none;transition:border-color var(--tr)}
.li:focus{border-color:var(--gold)}
.li::placeholder{color:var(--g3)}
.lb-btn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:var(--r);
  color:#060606;font-family:var(--fb);font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:background var(--tr)}
.lb-btn:hover{background:var(--gold2)}
.le{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}

/* APP */
#app{display:none;height:100vh;flex-direction:row}

/* SIDEBAR */
.sb{width:var(--sw);min-width:var(--sw);height:100vh;background:var(--bg2);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:var(--fd);font-size:26px;color:var(--gold);font-weight:300;letter-spacing:-1px}
.sb-name{font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--g2);margin-top:2px;font-family:var(--fd)}
.sb-nav{flex:1;padding:8px 0}
.nl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--g3);padding:12px 18px 4px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:12.5px;
  color:var(--g2);transition:all var(--tr);border-left:2px solid transparent;user-select:none}
.ni:hover{color:var(--w);background:rgba(255,255,255,.02)}
.ni.active{color:var(--gold);border-left-color:var(--gold);background:var(--gd);font-weight:500}
.ni-ic{font-size:14px;width:18px;text-align:center}
.sb-u{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#060606;flex-shrink:0}
.sb-ui{flex:1;min-width:0}
.sb-un{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ur{font-size:9px;color:var(--g3);margin-top:1px}
.sb-out{font-size:16px;cursor:pointer;color:var(--g3);transition:color var(--tr);padding:3px}
.sb-out:hover{color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{padding:0 22px;height:52px;min-height:52px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.tb-t{font-family:var(--fd);font-size:21px;font-weight:400}
.tb-a{display:flex;gap:7px}
.ct{flex:1;overflow-y:auto;padding:20px 22px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.ct2{font-family:var(--fd);font-size:14px;color:var(--g1);margin-bottom:12px;
  padding-bottom:9px;border-bottom:1px solid var(--border)}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kp{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;position:relative;overflow:hidden}
.kp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.kl{font-size:9px;color:var(--g3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.kv{font-family:var(--fd);font-size:24px;font-weight:300;color:var(--gold)}
.ks{font-size:10px;color:var(--g3);margin-top:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);
  font-family:var(--fb);font-size:12.5px;font-weight:500;cursor:pointer;border:none;
  transition:all var(--tr);user-select:none;white-space:nowrap}
.bp{background:var(--gold);color:#060606}.bp:hover{background:var(--gold2)}
.bg{background:transparent;color:var(--g2);border:1px solid var(--border)}.bg:hover{border-color:var(--gold);color:var(--gold)}
.bd{background:rgba(240,96,96,.1);color:var(--red);border:1px solid rgba(240,96,96,.2)}.bd:hover{background:rgba(240,96,96,.2)}
.bsm{padding:6px 11px;font-size:11.5px}

/* FORM */
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--g2);margin-bottom:4px;display:block;letter-spacing:.4px}
.fc{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--w);font-family:var(--fb);font-size:13px;
  transition:border-color var(--tr);outline:none}
.fc:focus{border-color:var(--gold)}
.fc::placeholder{color:var(--g3)}
select.fc option{background:var(--bg3)}
textarea.fc{resize:vertical;min-height:58px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* MODAL */
.mo{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.82);
  backdrop-filter:blur(4px);align-items:center;justify-content:center}
.mo.open{display:flex}
.mox{background:var(--bg2);border:1px solid var(--gb);border-radius:14px;padding:24px;
  width:450px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 70px rgba(0,0,0,.8)}
.mt{font-family:var(--fd);font-size:19px;color:var(--w);margin-bottom:16px;
  padding-bottom:12px;border-bottom:1px solid var(--border)}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 11px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--g3);font-weight:600;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
tbody td{padding:10px 11px;font-size:13px;color:var(--g1);border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tbody tr:hover td{background:rgba(255,255,255,.02)}
tbody tr:last-child td{border-bottom:none}

/* BADGE */
.bx{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.bg-gold{background:var(--gd);color:var(--gold);border:1px solid var(--gb)}
.bg-green{background:rgba(94,224,135,.1);color:var(--green);border:1px solid rgba(94,224,135,.2)}
.bg-red{background:rgba(240,96,96,.1);color:var(--red);border:1px solid rgba(240,96,96,.2)}
.bg-gray{background:rgba(255,255,255,.05);color:var(--g2);border:1px solid var(--border)}
.bg-blue{background:rgba(100,181,255,.1);color:var(--blue);border:1px solid rgba(100,181,255,.2)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 9px;border-radius:20px;font-size:11px;background:var(--bg3);
  border:1px solid var(--border);cursor:pointer;transition:all var(--tr);user-select:none}
.chip:hover,.chip.sel{background:var(--gd);border-color:var(--gold);color:var(--gold)}

/* AGENDA */
.ag-nav{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ag-dt{font-family:var(--fd);font-size:19px;flex:1}
.ag-grid{display:grid;gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden}
.ag-col{background:var(--bg2)}
.ag-hdr{padding:10px 12px;text-align:center;font-size:12px;font-weight:600;
  border-bottom:2px solid;letter-spacing:.3px}
.ag-slots{padding:7px;min-height:340px}
.ag-slot{border-radius:6px;padding:7px 9px;margin-bottom:5px;cursor:pointer;
  border-left:3px solid;transition:opacity var(--tr),transform .1s}
.ag-slot:hover{opacity:.78;transform:translateX(2px)}
.sl-t{font-size:9px;opacity:.55;margin-bottom:2px}
.sl-n{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sl-s{font-size:10px;opacity:.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ag-add{width:100%;padding:7px;text-align:center;font-size:10px;color:var(--g3);
  cursor:pointer;border:1px dashed var(--border);border-radius:6px;
  transition:all var(--tr);margin-top:3px}
.ag-add:hover{border-color:var(--gold);color:var(--gold);background:var(--gd)}

/* POS */
.pos-w{display:grid;grid-template-columns:1fr 290px;gap:12px}
.pos-cl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--g3);
  padding:7px 0;margin-top:5px;border-top:1px solid var(--border)}
.pos-it{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;cursor:pointer;transition:background var(--tr)}
.pos-it:hover{background:var(--bg3)}
.pi-n{font-size:13px;flex:1}
.pi-p{font-size:12px;color:var(--gold);font-weight:500;white-space:nowrap}
.pi-a{font-size:17px;color:var(--g3);transition:color var(--tr)}
.pos-it:hover .pi-a{color:var(--gold)}
.ci{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border)}
.ci-n{flex:1;font-size:12px;line-height:1.3}
.ci-qty{display:flex;align-items:center;gap:4px}
.qb{width:19px;height:19px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);
  color:var(--w);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.qb:hover{border-color:var(--gold);color:var(--gold)}
.ci-p{font-size:12px;color:var(--gold);min-width:52px;text-align:right}
.ct-row{padding:9px 0;display:flex;justify-content:space-between;align-items:center}
.ct-l{font-size:13px;color:var(--g2)}
.ct-v{font-family:var(--fd);font-size:22px;color:var(--gold)}

/* TICKET */
#tkov{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.92);
  align-items:center;justify-content:center}
#tkov.open{display:flex}
.tck{background:#fff;color:#111;padding:26px;width:290px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px}
.th{text-align:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed #ccc}
.th-l{font-size:16px;font-weight:700;letter-spacing:4px}
.th-s{font-size:8px;letter-spacing:2px;color:#777;margin-top:2px}
.tr2{display:flex;justify-content:space-between;padding:2px 0}
.tr2.tot{font-weight:700;border-top:1px dashed #ccc;margin-top:6px;padding-top:6px;font-size:12px}
.tf{text-align:center;margin-top:12px;padding-top:12px;border-top:1px dashed #ccc;font-size:8px;color:#999}
.tck-a{margin-top:12px;display:flex;gap:7px;justify-content:center}

/* TOAST */
#toast{position:fixed;bottom:18px;right:18px;z-index:9999;background:var(--bg2);
  border:1px solid var(--gb);border-radius:var(--r);padding:10px 15px;
  font-size:12.5px;opacity:0;transition:opacity .28s;pointer-events:none;
  box-shadow:0 6px 24px rgba(0,0,0,.6)}
#toast.show{opacity:1}
#toast.err{border-color:rgba(240,96,96,.4);color:var(--red)}
#toast.ok{border-color:rgba(94,224,135,.4);color:var(--green)}

/* EMPTY */
.empty{text-align:center;padding:34px;color:var(--g3)}
.ei{font-size:26px;margin-bottom:7px}
.et{font-size:12px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:8px 14px;font-size:12.5px;color:var(--g3);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tr);user-select:none;white-space:nowrap}
.tab:hover{color:var(--w)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* SBOX */
.sbox{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px}
.sbox input{background:none;border:none;outline:none;color:var(--w);font-family:var(--fb);font-size:13px;flex:1}
.sbox input::placeholder{color:var(--g3)}

/* HAMBURGER */
.ham{display:none}

/* BOOKING */
#bks{display:none;min-height:100vh;overflow-y:auto;
  background:var(--bg);background-image:radial-gradient(ellipse 60% 40% at 50% 30%,rgba(201,164,82,.06),transparent)}
.bk-h{text-align:center;padding:40px 20px 24px;border-bottom:1px solid var(--border)}
.bk-logo{font-family:var(--fd);font-size:44px;color:var(--gold);font-weight:300;letter-spacing:-2px}
.bk-brand{font-family:var(--fd);letter-spacing:7px;text-transform:uppercase;color:var(--g2);font-size:12px;margin-top:4px}
.bk-w{max-width:520px;margin:0 auto;padding:26px 18px 56px}
.bk-step{display:none}
.bk-step.active{display:block}
.bk-t{font-family:var(--fd);font-size:22px;margin-bottom:16px}
.bk-sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.bk-s{padding:11px 9px;border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg2);cursor:pointer;text-align:center;transition:all var(--tr)}
.bk-s:hover,.bk-s.sel{border-color:var(--gold);background:var(--gd)}
.bk-sn{font-size:11px}
.bk-sp{font-size:10px;color:var(--gold);margin-top:2px}

@media(max-width:768px){
  :root{--sw:0px}
  .sb{position:fixed;left:-240px;z-index:500;width:240px;transition:left .26s ease}
  .sb.open{left:0;box-shadow:0 0 50px rgba(0,0,0,.9)}
  .ham{display:flex;align-items:center;justify-content:center;width:32px;height:32px;cursor:pointer;font-size:17px}
  .pos-w{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
  .kg{grid-template-columns:1fr 1fr}
  .ct{padding:13px}
  .tb{padding:0 13px}
  .ag-grid{grid-template-columns:1fr!important}
  .bk-sg{grid-template-columns:1fr}
}
@media(max-width:480px){.kg{grid-template-columns:1fr}.lb{padding:32px 20px}}
</style>
</head>

<!-- LOGIN -->
<div id="ls">
  <div class="lb">
    <div class="lm">BLA</div>
    <div class="ln">Beauty Lab</div>
    <div class="ls2">Sistema Operativo</div>
    <div class="ll"></div>
    <input class="li" id="li-e" type="email" placeholder="Correo electrónico" autocomplete="email">
    <input class="li" id="li-p" type="password" placeholder="Contraseña" autocomplete="current-password">

</div>

<!-- TICKET OVERLAY -->
<div id="tkov">

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div class="mo" id="mo"><div class="mox" id="mc"></div></div>

<!-- BOOKING -->
<div id="bks">

async function dbQ(t,f={}){
  try{
    let q=sb.from(t).select('*');
    for(const[k,v]of Object.entries(f))q=q.eq(k,v);
    const{data,error}=await q.order('created_at',{ascending:false});
    if(error)throw error; return data||[];
  }catch{return[];}
}
async function dbI(t,d){
  try{
    const{data:r,error}=await sb.from(t).insert(d).select().single();
    if(error)throw error; return r;
  }catch(e){toast('Error al guardar','err');return null;}
}
async function dbU(t,id,d){
  try{const{error}=await sb.from(t).update(d).eq('id',id);if(error)throw error;return true;}
  catch{toast('Error','err');return false;}
}
async function dbD(t,id){
  try{await sb.from(t).delete().eq('id',id);return true;}catch{return false;}
}

function getSemana(d){
  const dt=new Date(d),day=dt.getDay(),diff=dt.getDate()-day+(day===0?-6:1);
  const mon=new Date(dt.setDate(diff));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{mon,sun};
}

function filtCS(q){
  const r=G('csr');if(!r)return;
  const list=q?CAT.filter(s=>s.name.toLowerCase().includes(q.toLowerCase())).slice(0,12):CAT.slice(0,12);
  r.innerHTML=list.map(s=>`<div class="chip ${_cSvcs.includes(s.name)?'sel':''}" onclick="togCS('${s.name}',this)">${s.name}</div>`).join('');
}
function togCS(name,el){
  el.classList.toggle('sel');
  _cSvcs.includes(name)?(_cSvcs=_cSvcs.filter(s=>s!==name)):_cSvcs.push(name);
  const ss=G('css');
  if(ss)ss.innerHTML=_cSvcs.map(s=>`<span class="chip sel">${s}</span>`).join('');
}

async function saveCita(){
  const fecha=G('cf')?.value,hi=G('chi')?.value,hf=G('chf')?.value,estId=G('ce')?.value;
  const cliId=G('ccl')?.value,cliNom=G('ccl')?.selectedOptions[0]?.dataset?.n||'';
  const nuevo=G('cnc')?.value?.trim(),notas=G('cn')?.value;
  if(!fecha||!estId){toast('Fecha y estilista requeridos','err');return;}
  let cid=cliId,cnm=cliNom||nuevo||'Sin nombre';
  if(!cliId&&nuevo){
    const nc=await dbI('bl_clientes',{nombre:nuevo,created_at:new Date().toISOString()});
    if(nc){cid=nc.id;cnm=nuevo;}
  }
  const r=await dbI('bl_citas',{fecha,hora_inicio:hi,hora_fin:hf,estilista_id:estId,
    cliente_id:cid||null,cliente_nombre:cnm,servicios:_cSvcs,notas,estado:'pendiente',
    created_at:new Date().toISOString()});
  _cSvcs=[];
  if(r){toast('Cita guardada ✓','ok');closeM();pgAgenda();}
}

async function verCita(id){
  const citas=await dbQ('bl_citas');
  const ci=citas.find(c=>c.id===id);if(!ci)return;
  const est=STAFF.find(s=>s.id===ci.estilista_id);
  openM(`
    <div class="mt">${ci.cliente_nombre||'Sin nombre'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px">
      <div><div style="font-size:9px;color:var(--g3)">Fecha</div><div style="margin-top:2px;font-size:13px">${ci.fecha}</div></div>
      <div><div style="font-size:9px;color:var(--g3)">Horario</div><div style="margin-top:2px;font-size:13px">${ci.hora_inicio||'—'} – ${ci.hora_fin||'—'}</div></div>
      <div><div style="font-size:9px;color:var(--g3)">Estilista</div><div style="margin-top:2px;font-size:13px;color:${est?.color||'#fff'}">${est?.name||'—'}</div></div>
      <div><div style="font-size:9px;color:var(--g3)">Estado</div><div style="margin-top:2px"><span class="bx ${ci.estado==='completada'?'bg-green':ci.estado==='cancelada'?'bg-red':'bg-gray'}">${ci.estado||'pendiente'}</span></div></div>
    </div>
    ${(ci.servicios||[]).length?`<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--g3);margin-bottom:6px">Servicios</div><div class="chips">${(ci.servicios||[]).map(s=>`<span class="chip">${s}</span>`).join('')}</div></div>`:''}
    ${ci.notas?`<div style="font-size:12px;color:var(--g2);padding:9px;background:var(--bg3);border-radius:var(--r);margin-bottom:12px">${ci.notas}</div>`:''}
    <div class="ma">
      <button class="btn bd bsm" onclick="cancelarCita('${id}')">Cancelar cita</button>
      ${ci.estado!=='completada'?`<button class="btn bg bsm" onclick="compCita('${id}','agenda')">✓ Completar</button>`:''}
      <button class="btn bp bsm" onclick="irACaja('${ci.estilista_id}','${ci.cliente_id||''}','${(ci.cliente_nombre||'').replace(/'/g,"\\'")}')">Cobrar</button>
    </div>`);
}

async function compCita(id,src){
  await dbU('bl_citas',id,{estado:'completada'});
  toast('Completada ✓','ok');closeM();
  src==='agenda'?pgAgenda():pgDash();
}
async function cancelarCita(id){
  await dbU('bl_citas',id,{estado:'cancelada'});
  toast('Cita cancelada','');closeM();pgAgenda();
}
function irACaja(estId,cliId,cliNom){
  selEst=STAFF.find(s=>s.id===estId)||null;
  selCli=cliId?{id:cliId,nombre:cliNom}:null;
  cart=[];closeM();navigate('caja');
}

  closeM();renderCart();
  toast(`${n} agregado ✓`,'ok');
}

  renderCart();
  toast(`${name} agregado ✓`,'ok');
}

// Al cobrar, descontar stock de productos de inventario
async function descontarInventario(items){
  for(const item of items){
    if(item.invId){
      const prods=await dbQ('bl_inventario');
      const prod=prods.find(p=>p.id===item.invId);
      if(prod){
        const nuevoStock=Math.max(0,(prod.stock||0)-item.qty);
        await dbU('bl_inventario',item.invId,{stock:nuevoStock});
      }
    }
  }
}
function renderPCats(cats,pm={}){
  return cats.map(cat=>`
    <div class="pos-cl">${cat}</div>
    ${CAT.filter(s=>s.cat===cat).map(s=>{
      const p=pm[s.id]??s.price;
      return`<div class="pos-it" onclick="addCart('${s.id}',${p})">
        <span class="pi-n">${s.name}</span>
        <span class="pi-p">${s.variable?'Variable':mxn(p)}</span>
        <span class="pi-a">+</span>
      </div>`;}).join('')}`).join('');
}

function posTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['pos-svcs','pos-paq','pos-joyeria','pos-prodpelo'].forEach(id=>{
    const d=G(id);if(d)d.style.display=id==='pos-'+tab||id===tab?'block':'none';
  });
  // mapeo de tab ids
  const map={svcs:'pos-svcs',paquetes:'pos-paq',joyeria:'pos-joyeria',prodpelo:'pos-prodpelo'};
  ['pos-svcs','pos-paq','pos-joyeria','pos-prodpelo'].forEach(id=>{
    const d=G(id);if(d)d.style.display=map[tab]===id?'block':'none';
  });
}
function filtP(q){
  const pc=G('pcats');if(!pc)return;
  if(!q){pc.innerHTML=renderPCats(CATS);return;}
  const r=CAT.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  pc.innerHTML=r.map(s=>`<div class="pos-it" onclick="addCart('${s.id}')"><span class="pi-n">${s.name}</span><span class="pi-p">${mxn(s.price)}</span><span class="pi-a">+</span></div>`).join('');
}
function setEst(id){selEst=STAFF.find(s=>s.id===id)||null;}
function setCli(id,name){selCli=id?{id,nombre:name}:null;}
function addCart(sid,customPrice){
  const s=CAT.find(x=>x.id===sid);if(!s)return;
  const price=customPrice??s.price;
  if(s.variable){
    openM(`<div class="mt">Precio para ${s.name}</div>
      <div class="fg"><label class="fl">Precio ($)</label><input class="fc" id="vp" type="number" min="0" placeholder="0"></div>
      <div class="ma">
        <button class="btn bg bsm" onclick="closeM()">Cancelar</button>
        <button class="btn bp bsm" onclick="addVarCart('${sid}')">Agregar</button>
      </div>`);
    return;
  }
  const ex=cart.find(i=>i.id===sid);
  if(ex)ex.qty++;
  else cart.push({id:sid,name:s.name,price:price,qty:1});
  renderCart();
}
function addVarCart(sid){
  const p=parseFloat(G('vp')?.value)||0;
  const s=CAT.find(x=>x.id===sid);if(!s)return;
  cart.push({id:sid+Date.now(),name:s.name,price:p,qty:1});
  closeM();renderCart();
}
function addPaq(pid){
  const pk=PAQUETES.find(p=>p.id===pid);if(!pk)return;
  cart.push({id:pid+Date.now(),name:pk.name,price:pk.price,qty:1,esPaq:true});
  renderCart();toast(`Paquete "${pk.name}" agregado`,'ok');
}
function qtyCart(id,d){
  const i=cart.find(x=>x.id===id);if(!i)return;
  i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);
  renderCart();
}
function renderCart(){
  const sub=cart.reduce((s,i)=>s+(i.price*i.qty),0);
  const desc=parseFloat(G('pdesc')?.value)||0;
  const tot=Math.max(0,sub-desc);
  const ci=G('cart-items'),cs=G('cart-sub'),ct=G('cart-tot');
  if(ci)ci.innerHTML=cart.length?cart.map(i=>`
    <div class="ci">
      <div class="ci-n" style="flex:1">${i.name}${i.esPaq?` <span class="bx bg-gold" style="font-size:8px">PKG</span>`:''}</div>
      <div class="ci-qty">
        <button class="qb" onclick="qtyCart('${i.id}',-1)">−</button>
        <span style="font-size:12px;min-width:14px;text-align:center">${i.qty}</span>
        <button class="qb" onclick="qtyCart('${i.id}',1)">+</button>
      </div>
      <div class="ci-p" onclick="editCartPrice('${i.id}')" style="cursor:pointer;text-decoration:underline dotted;min-width:60px;text-align:right" title="Toca para editar precio">${mxn(i.price*i.qty)}</div>
    </div>`).join('')
  :'<div class="empty" style="padding:12px"><div class="et">Sin servicios</div></div>';
  if(cs)cs.textContent=mxn(sub);
  if(ct)ct.textContent=mxn(tot);
}

function applyCartPrice(id){
  const v=parseFloat(G('ecp-v')?.value)||0;
  if(!v){toast('Precio inválido','err');return;}
  const item=cart.find(x=>x.id===id);
  if(item){item.price=v;}

}
function clearCart(){cart=[];renderCart();}

async function cobrar(){
  if(!cart.length){toast('Agrega servicios al carrito','err');return;}
  if(!selEst){toast('Selecciona una estilista','err');return;}
  const desc=parseFloat(G('pdesc')?.value)||0;
  const sub=cart.reduce((s,i)=>s+(i.price*i.qty),0);
  const tot=Math.max(0,sub-desc);
  const pago=G('ppago')?.value||'efectivo';
  const comm=tot*selEst.comm;
  const venta=await dbI('bl_ventas',{
    estilista_id:selEst.id,estilista_nombre:selEst.name,
    cliente_id:selCli?.id||null,cliente_nombre:selCli?.nombre||'Sin nombre',
    items:cart,subtotal:sub,descuento:desc,total:tot,metodo_pago:pago,
    comision:comm,created_at:new Date().toISOString()
  });
  if(venta){
    await descontarInventario(cart);
    showTicket(venta);cart=[];selCli=null;
  }
}

    </div>`);
}
async function savePrecio(id){
  const v=parseFloat(G('ep-v')?.value)||0;
  // Buscar si ya existe
  const exist=await sb.from('bl_precios').select('id').eq('servicio_id',id).single().catch(()=>({data:null}));
  if(exist.data){
    await sb.from('bl_precios').update({precio:v}).eq('servicio_id',id);
  } else {
    await dbI('bl_precios',{servicio_id:id,precio:v,created_at:new Date().toISOString()});
  }
  toast('Precio actualizado ✓','ok');closeM();pgCat();
}
async function resetPrecio(id){
  await sb.from('bl_precios').delete().eq('servicio_id',id);
  toast('Precio restablecido ✓','ok');pgCat();
}

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const allIds=['cat-paq',...CATS.map((_,i)=>`cat-${i}`)];
  allIds.forEach(x=>{const d=G(x);if(d)d.style.display=x===id?'block':'none';});

function exportarExcel(ventas, nombreArchivo){
  // Construir CSV con BOM para Excel en español
  const BOM = '\uFEFF';
  const headers = ['Fecha','Hora','Estilista','Clienta','Servicios','Subtotal','Descuento','Total','Método de Pago','Comisión'];
  const rows = ventas.map(v=>[
    new Date(v.created_at).toLocaleDateString('es-MX'),
    new Date(v.created_at).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),
    v.estilista_nombre||'—',
    v.cliente_nombre||'—',
    (v.items||[]).map(i=>i.name+(i.qty>1?' x'+i.qty:'')).join(' / '),
    v.subtotal||0,
    v.descuento||0,
    v.total||0,
    v.metodo_pago||'—',
    v.comision||0
  ]);
  const csv = BOM + [headers, ...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=nombreArchivo+'.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Excel descargado ✓','ok');
}

async function exportarDia(fecha){
  const ventas=await dbQ('bl_ventas');

  const mes=G('rep-mes')?.value||new Date().toISOString().slice(0,7);
  const [ventas,citas,clis]=await Promise.all([dbQ('bl_ventas'),dbQ('bl_citas'),dbQ('bl_clientes')]);
  const vM=ventas.filter(v=>(v.created_at||'').startsWith(mes));
  const cM=citas.filter(c=>(c.fecha||'').startsWith(mes));

  // Servicios más vendidos
  const svcCount={};
  vM.forEach(v=>(v.items||[]).forEach(i=>{svcCount[i.name]=(svcCount[i.name]||0)+i.qty;}));
  const topSvc=Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Clientes recurrentes vs nuevos (simplificado)
  const noShow=cM.filter(c=>c.estado==='cancelada').length;

  G('ct').innerHTML=`

      <div class="kp"><div class="kl">Canceladas</div><div class="kv" style="color:var(--red)">${noShow}</div></div>
      <div class="kp"><div class="kl">Ticket Promedio</div><div class="kv">${mxn(vM.length?Math.round(vM.reduce((s,v)=>s+(v.total||0),0)/vM.length):0)}</div></div>
      <div class="kp"><div class="kl">Total Clientas</div><div class="kv">${clis.length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="card">
        <div class="ct2">Servicios Más Vendidos</div>
        ${topSvc.length?topSvc.map(([name,qty],i)=>`
          <div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:11px;color:var(--g3);min-width:16px">#${i+1}</span>
            <span style="font-size:12px;flex:1">${name}</span>
            <span class="bx bg-gold">${qty}x</span>
          </div>`).join('')
        :'<div class="empty" style="padding:12px"><div class="et">Sin datos</div></div>'}
      </div>
      <div class="card">
        <div class="ct2">Ventas por Estilista</div>
        ${STYLISTS.map(s=>{
          const sv=vM.filter(v=>v.estilista_id===s.id);
          const tot=sv.reduce((a,v)=>a+(v.total||0),0);
          const pct=vM.reduce((a,v)=>a+(v.total||0),0);
          const p=pct?Math.round(tot/pct*100):0;
          return`<div style="margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
              <div style="width:7px;height:7px;border-radius:50%;background:${s.color}"></div>
              <span style="font-size:12px;flex:1">${s.name}</span>
              <span style="font-size:12px;color:var(--gold)">${mxn(tot)}</span>
              <span style="font-size:10px;color:var(--g3)">${p}%</span>
            </div>
            <div style="height:4px;border-radius:2px;background:var(--border)">
              <div style="height:100%;border-radius:2px;background:${s.color};width:${p}%;transition:width .4s"></div>
            </div>
          </div>`;}).join('')}
      </div>
    </div>`;
}

// Helpers de semana
function getLunes(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=dt.getDate()-day+(day===0?-6:1);
  dt.setDate(diff);dt.setHours(0,0,0,0);return dt;
}
function getSemanaStr(lunes){
  const dom=new Date(lunes);dom.setDate(dom.getDate()+6);
  const f=d=>d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});
  return`${f(lunes)} – ${f(dom)}`;
}
function isoSemana(lunes){return lunes.toISOString().slice(0,10);}

let nomSemana=getLunes(new Date());

async function pgNomina(){
  G('tba').innerHTML=``;
  G('ct').innerHTML=`
    <div class="tabs">
      <div class="tab active" onclick="nomTab(this,'nom-calc')">Calcular Nómina</div>
      <div class="tab" onclick="nomTab(this,'nom-hist')">Historial de Pagos</div>
    </div>
    <div id="nom-calc"></div>
    <div id="nom-hist" style="display:none"></div>`;
  renderNomCalc();
}

function nomTab(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  G('nom-calc').style.display=id==='nom-calc'?'block':'none';
  G('nom-hist').style.display=id==='nom-hist'?'block':'none';
  if(id==='nom-calc')renderNomCalc();
  else renderNomHist();
}

async function renderNomCalc(){
  const w=G('nom-calc');if(!w)return;
  const lunes=nomSemana;
  const dom=new Date(lunes);dom.setDate(dom.getDate()+6);
  const semStr=getSemanaStr(lunes);
  const semKey=isoSemana(lunes);

  // Ventas de la semana
  const ventas=await dbQ('bl_ventas');
  const vSem=ventas.filter(v=>{
    const d=new Date(v.created_at);
    return d>=lunes&&d<=dom;
  });

  // Nóminas ya pagadas esta semana
  const pagos=await dbQ('bl_nominas');
  const pagSem=pagos.filter(p=>p.semana===semKey);

  const rows=STYLISTS.map(s=>{
    const sv=vSem.filter(v=>v.estilista_id===s.id);
    const venBruto=sv.reduce((a,v)=>a+(v.total||0),0);
    const comision=sv.reduce((a,v)=>a+(v.comision||0),0);
    const total=s.salary+comision;
    const pagado=pagSem.find(p=>p.estilista_id===s.id);
    return{...s,sv,venBruto,comision,total,pagado};
  });

  const totalNom=rows.reduce((s,r)=>s+r.total,0);

  w.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn bg bsm" onclick="nomNav(-7)">◀</button>

        Semana del <span style="color:var(--gold)">${semStr}</span>
      </div>
      <button class="btn bg bsm" onclick="nomNav(7)" ${lunes>=getLunes(new Date())?'disabled':''}>▶</button>
      <button class="btn bg bsm" onclick="nomSemana=getLunes(new Date());renderNomCalc()">Esta semana</button>
    </div>
    <div class="kg" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:16px">
      <div class="kp"><div class="kl">Total a Pagar</div><div class="kv">${mxn(totalNom)}</div></div>
      <div class="kp"><div class="kl">Ventas Generadas</div><div class="kv" style="color:var(--gold)">${mxn(vSem.reduce((s,v)=>s+(v.total||0),0))}</div></div>
      <div class="kp"><div class="kl">Pagadas</div><div class="kv" style="color:var(--green)">${pagSem.length} / ${STYLISTS.length}</div></div>
    </div>
    ${rows.map(r=>`
      <div class="card" style="margin-bottom:10px;${r.pagado?'opacity:.75':''}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div style="width:38px;height:38px;border-radius:50%;background:${r.color};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#060606">${r.name[0]}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${r.name}</div>
            <div style="font-size:10px;color:var(--g3)">${ROLES[r.role]}</div>
          </div>
          ${r.pagado
            ?`<span class="bx bg-green">✓ Pagada ${new Date(r.pagado.created_at).toLocaleDateString('es-MX')}</span>`
            :`<div style="display:flex;gap:6px">
               <button class="btn bg bsm" onclick="imprimirRecibo('${r.id}','${semKey}','${semStr}',${r.salary},${r.comision},${r.venBruto},${r.total})">🖨 Recibo</button>
               <button class="btn bp bsm" onclick="marcarPagada('${r.id}','${r.name}','${semKey}','${semStr}',${r.salary},${r.comision},${r.total})">Marcar pagada</button>
             </div>`}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:var(--bg3);border-radius:8px;padding:10px">
            <div style="font-size:9px;color:var(--g3)">Sueldo Base</div>
            <div style="font-family:var(--fd);font-size:17px">${mxn(r.salary)}</div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px">
            <div style="font-size:9px;color:var(--g3)">Ventas</div>
            <div style="font-family:var(--fd);font-size:17px;color:var(--gold)">${mxn(r.venBruto)}</div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px">
            <div style="font-size:9px;color:var(--g3)">Comisión (${Math.round(r.comm*100)}%)</div>
            <div style="font-family:var(--fd);font-size:17px;color:var(--blue)">${mxn(r.comision)}</div>
          </div>
          <div style="background:var(--gd);border:1px solid var(--gb);border-radius:8px;padding:10px">
            <div style="font-size:9px;color:var(--g3)">Total a Pagar</div>
            <div style="font-family:var(--fd);font-size:17px;color:var(--gold);font-weight:600">${mxn(r.total)}</div>
          </div>
        </div>
        ${r.sv.length?`
          <div style="font-size:9px;color:var(--g3);margin-bottom:6px">${r.sv.length} venta(s) esta semana</div>
          <div class="tw"><table>
            <thead><tr><th>Fecha</th><th>Clienta</th><th>Venta</th><th>Comisión</th></tr></thead>
            <tbody>${r.sv.map(v=>`<tr>
              <td style="font-size:11px">${new Date(v.created_at).toLocaleDateString('es-MX')}</td>

          </table></div>`
        :`<div style="font-size:12px;color:var(--g3);text-align:center;padding:8px">Sin ventas esta semana — se paga solo el base</div>`}
      </div>`).join('')}`;
}

async function renderNomHist(){
  const w=G('nom-hist');if(!w)return;
  w.innerHTML='<div class="empty"><div class="et">Cargando...</div></div>';
  const pagos=await dbQ('bl_nominas');

  // Agrupar por semana
  const bySem={};
  pagos.forEach(p=>{
    if(!bySem[p.semana])bySem[p.semana]={semana_str:p.semana_str,pagos:[],total:0};
    bySem[p.semana].pagos.push(p);
    bySem[p.semana].total+=(p.total||0);
  });
  const sems=Object.keys(bySem).sort((a,b)=>b.localeCompare(a));

  if(!sems.length){
    w.innerHTML='<div class="empty"><div class="ei">💰</div><div class="et">Sin pagos registrados aún</div></div>';
    return;
  }

  const totalHist=pagos.reduce((s,p)=>s+(p.total||0),0);

  w.innerHTML=`
    <div class="kg" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
      <div class="kp"><div class="kl">Total Pagado (histórico)</div><div class="kv">${mxn(totalHist)}</div></div>
      <div class="kp"><div class="kl">Semanas Pagadas</div><div class="kv">${sems.length}</div></div>
    </div>
    ${sems.map(semKey=>{
      const s=bySem[semKey];
      return`<div class="card" style="margin-bottom:9px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="font-size:13px;font-weight:600">Semana del ${s.semana_str}</div>
            <div style="font-size:10px;color:var(--g3)">${s.pagos.length} pago(s) registrado(s)</div>
          </div>
          <div style="font-family:var(--fd);font-size:20px;color:var(--gold)">${mxn(s.total)}</div>
        </div>
        <div class="tw"><table>
          <thead><tr><th>Persona</th><th>Base</th><th>Comisión</th><th>Total</th><th>Método</th><th>Fecha</th></tr></thead>
          <tbody>${s.pagos.map(p=>{
            const est=STAFF.find(x=>x.id===p.estilista_id);
            return`<tr>
              <td>
                <div style="display:flex;align-items:center;gap:7px">
                  <div style="width:20px;height:20px;border-radius:50%;background:${est?.color||'#555'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#060606">${(p.estilista_nombre||'?')[0]}</div>
                  <span style="font-size:12px">${p.estilista_nombre||'—'}</span>
                </div>
              </td>
              <td style="font-size:12px">${mxn(p.sueldo_base)}</td>
              <td style="color:var(--blue)">${mxn(p.comision)}</td>
              <td style="color:var(--gold);font-weight:600">${mxn(p.total)}</td>
              <td><span class="bx bg-gray" style="font-size:9px">${p.metodo_pago||'—'}</span></td>
              <td style="font-size:10px;color:var(--g3)">${new Date(p.created_at).toLocaleDateString('es-MX')}</td>
            </tr>`;}).join('')}
          </tbody>
        </table></div>
      </div>`;}).join('')}`;
}
